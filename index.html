<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scoreboard</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h3>HOME</h3>
        <div class="result-box" id="home-resultbox">
          <p class="result" id="home-result"></p>
        </div>
        <div class="btn-container">
          <button class="btn home" id="home-add1Point">+1</button>
          <button class="btn home" id="home-add2Point">+2</button>
          <button class="btn home" id="home-add3Point">+3</button>
        </div>
      </div>
      <div>
        <h3>GUEST</h3>
        <div class="result-box" id="guest-resultbox">
          <p class="result" id="guest-result"></p>
        </div>
        <div class="btn-container">
          <button class="btn" id="guest-add1Point">+1</button>
          <button class="btn" id="guest-add2Point">+2</button>
          <button class="btn" id="guest-add3Point">+3</button>
        </div>
      </div>
    </div>
    <button class="btn btn-reset" id="btn-reset">Reset</button>

    <script src="./src/index.js"></script>
  </body>
</html>
